name: Deploy Backend (VPS)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-backend-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            APP_DIR="/home/kelvin/.openclaw/workspace/Agents-Mission-Control"
            LOCAL_ONLY_FILE="ecosystem.config.cjs"

            cd "$APP_DIR"

            # Fail fast if the VPS repo has unexpected local tracked changes outside the known local-only file.
            OTHER_TRACKED_CHANGES="$(git status --porcelain --untracked-files=no | grep -v " $LOCAL_ONLY_FILE$" || true)"
            if [ -n "$OTHER_TRACKED_CHANGES" ]; then
              echo "Unexpected local tracked changes detected outside $LOCAL_ONLY_FILE. Aborting deploy."
              printf '%s\n' "$OTHER_TRACKED_CHANGES"
              exit 1
            fi

            if [ ! -f "$LOCAL_ONLY_FILE" ]; then
              echo "$LOCAL_ONLY_FILE is missing on VPS; aborting deploy to avoid deploying with unknown PM2 config."
              exit 1
            fi

            TMP_LOCAL_FILE="$(mktemp)"
            chmod 600 "$TMP_LOCAL_FILE"
            cleanup() {
              rm -f "$TMP_LOCAL_FILE"
            }
            trap cleanup EXIT

            cp "$LOCAL_ONLY_FILE" "$TMP_LOCAL_FILE"

            git fetch origin main
            git checkout main
            git reset --hard origin/main

            cp "$TMP_LOCAL_FILE" "$LOCAL_ONLY_FILE"

            npm ci
            npm run build --workspace backend

            pm2 startOrReload ecosystem.config.cjs --update-env
            pm2 save

            # Wait until API is ready after reload
            for i in {1..20}; do
              if curl -fsS http://127.0.0.1:4000/api/health >/dev/null; then
                break
              fi
              sleep 1
            done

            curl -fsS http://127.0.0.1:4000/api/health
